name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Этап 1: Тесты
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        run: |
          python manage.py test --verbosity=2

  # Этап 2: Линтер
  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 linter
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # Этап 3: Сборка Docker-образа
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t lms-project:${{ github.sha }} .

      - name: Verify Docker image
        run: |
          docker images lms-project

  # Этап 4: Деплой (симуляция)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment to server
        run: |
          echo "=== Deployment Simulation ==="
          echo "Server IP: ${{ secrets.SERVER_IP }}"
          echo "Deploying commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo ""
          echo "Steps that would be executed on real server:"
          echo "1. SSH connection to ${{ secrets.SERVER_IP }}"
          echo "2. git pull origin main"
          echo "3. pip install -r requirements.txt"
          echo "4. python manage.py migrate"
          echo "5. python manage.py collectstatic --noinput"
          echo "6. sudo systemctl restart lms"
          echo ""
          echo "=== Deployment simulation completed successfully ==="